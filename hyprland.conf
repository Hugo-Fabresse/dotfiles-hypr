# Hyprland configuration — Minimal, froid, rationnel
# Arch Linux — Hyprland v0.52+
# Pas d'effets inutiles, pas de décorations superflues
# Discipline : rapidité, silence, efficacité

###################################
# VARIABLES
###################################
$terminal = kitty
$menu = wofi --show drun --style ~/.config/wofi/style.css --conf ~/.config/wofi/config
$browser = google-chrome-stable --remote-debugging-port=9222
$spotify = flatpak run com.spotify.Client
$lock = hyprlock
$mainMod = SUPER

###################################
# MONITOR
###################################
monitor = eDP-1,1920x1080@60,0x0,1
# Ajouter écrans externes si nécessaire
# monitor = HDMI-A-1,1920x1080@60,1920x0,1

###################################
# STARTUP
###################################
exec-once = nm-applet
exec-once = ~/.config/hypr/startup_bg.sh
exec-once = waybar -c ~/.local/share/hypr/waybar/config -s ~/.local/share/hypr/waybar/style.css
exec-once = mako --config ~/.config/mako/config
exec-once = $terminal

###################################
# INPUT
###################################
input {
    kb_layout = us
    kb_options = caps:escape
    follow_mouse = 1
    sensitivity = 0
    touchpad {
        natural_scroll = no
        disable_while_typing = true
    }
}

###################################
# DECORATIONS
###################################
decoration {
    rounding = 8
    active_opacity = 1
    inactive_opacity = 1

    blur {
        enabled = true
        size = 5
        passes = 3
        new_optimizations = true
        ignore_opacity = false
        xray = false
    }
}

###################################
# LAYER RULES
###################################
layerrule {
    name = wofi_blur
    match:namespace = ^(wofi)$
    blur = true
    ignore_alpha = true
}

layerrule {
    name = waybar_blur
    match:namespace = ^(waybar)$
    blur = true
    ignore_alpha = true
}

###################################
# WINDOW RULES
###################################
# Chrome PiP
windowrule {
    name = chrome_pip
    match:title = ^(Picture-in-picture|Picture in picture)$
    float = true
    pin = true
    # no_border = true
    size = 25% 25%
}

# Spotify PiP
windowrule {
    name = spotify_pip
    match:title = ^(Spotify PiP)$
    float = true
    pin = true
    # no_border = true
}

# Calendar
windowrule {
    name = hypr_calendar
    match:title = ^(Hyprland Calendar)$
    float = true
    pin = true
    # no_border = true
}

# Volume Input
windowrule {
    name = volume_input
    match:title = ^(Volume Input)$
    float = true
    pin = true
    # no_border = true
}

###################################
# ANIMATIONS
###################################
animations {
    enabled = true

    bezier = snap, 0.2, 0.8, 0.25, 1.0
    bezier = drift, 0.3, 0.0, 0.2, 1.0

    animation = windows, 1, 3, snap
    animation = windowsOut, 1, 3, snap
    animation = border, 1, 3, snap
    animation = fade, 1, 3, snap
    animation = workspaces, 1, 4, drift, fade
}

###################################
# GENERAL
###################################
general {
    gaps_in = 6
    gaps_out = 12
    border_size = 2
    col.active_border = rgba(ffffffee) rgba(444444ee) 45deg
    col.inactive_border = rgba(444444ee)
    resize_on_border = true
}

###################################
# KEYBINDS
###################################
# Apps
bind = $mainMod, Return, exec, bash -c 'if pidof kitty > /dev/null && [ -S /tmp/kitty ]; then kitty @ --to unix:/tmp/kitty launch --type=os-window --cwd=last_reported; else kitty --listen-on unix:/tmp/kitty; fi'
bind = $mainMod, n, exec, $browser
bind = $mainMod, s, exec, $spotify
bind = $mainMod SHIFT, s, exec, python3 ~/.local/bin/spotify-pip.py
bind = $mainMod, v, exec, ~/.local/bin/volume_input.py
bind = $mainMod, d, exec, ~/.local/share/hypr/wofi_toggle.sh
bind = $mainMod CTRL, l, exec, $lock
bind = $mainMod, q, killactive
bind = $mainMod SHIFT, q, exit

# Move focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, j, movefocus, d
bind = $mainMod, k, movefocus, u

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move windows
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# Move windows to workspaces
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Resize windows
binde = $mainMod SHIFT, Right, resizeactive, 30 0
binde = $mainMod SHIFT, Left, resizeactive, -30 0
binde = $mainMod SHIFT, Up, resizeactive, 0 -30
binde = $mainMod SHIFT, Down, resizeactive, 0 30

# Toggle waybar
bind = $mainMod, b, exec, ~/.local/share/hypr/toggle_waybar.sh

# Floating / fullscreen
bind = $mainMod, f, togglefloating
bind = $mainMod, space, fullscreen

# Floating window drag/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

###################################
# SCREENSHOTS (grim + slurp)
###################################
bind = , Print, exec, grim ~/Pictures/screenshot_$(date +"%Y%m%d_%H%M%S").png
bind = SHIFT, Print, exec, slurp | grim -g - ~/Pictures/screenshot_$(date +"%Y%m%d_%H%M%S").png

###################################
# AUDIO
###################################
binde = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
binde = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind  = , XF86AudioMute,        exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

###################################
# BRIGHTNESS
###################################
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-

###################################
# CURSOR
###################################
cursor {
    no_hardware_cursors = true
}

###################################
# LOGIC TERMINÉ
###################################
# Système discipliné — pas de chaos
